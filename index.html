<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMNDR - Track your deadlines</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --urgent: #f43f5e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 600px; }

        header { margin-bottom: 40px; text-align: center; }
        h1 { letter-spacing: 4px; font-weight: 800; color: var(--accent); margin: 0; }
        #current-date { color: var(--text-dim); font-size: 0.9rem; margin-top: 8px; }

        .deadline-list { display: flex; flex-direction: column; gap: 16px; }

        .deadline-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .info h3 { margin: 0; font-size: 1.1rem; }
        .info p { margin: 4px 0 0; color: var(--text-dim); font-size: 0.85rem; }

        .status { text-align: right; min-width: 100px; }
        .days-left {
            display: inline-block;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
        }

        .urgent { border-left: 4px solid var(--urgent); }
        .urgent .days-left { background: rgba(244, 63, 94, 0.1); color: var(--urgent); }

        .date-label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-top: 6px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>RMNDR</h1>
        <div id="current-date"></div>
    </header>

    <div id="deadline-container" class="deadline-list"></div>
</div>

<script>
    const deadlines = [
        { title: "10 Page Bio Assignment", category: "Biology", date: "2026-04-16" },
        { title: "Sensors Observation Note", category: "Lab Work", date: "2026-04-16" },
        { title: "Math Assignment", category: "Mathematics", date: "2026-04-20" },
        { title: "Sensors Project Submission", category: "Engineering", date: "2026-04-24" },
        { title: "BIO CT4", category: "Portions: Unit 3, 4, 5 Full", date: "2026-04-29" }
    ];

    function updateDashboard() {
        const container = document.getElementById('deadline-container');
        const dateDisplay = document.getElementById('current-date');
        
        // 1. Get today's date and strip the time (Local Time)
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

        dateDisplay.innerText = now.toLocaleDateString('en-GB', { 
            weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
        });

        container.innerHTML = '';
        deadlines.sort((a, b) => new Date(a.date) - new Date(b.date));

        deadlines.forEach(item => {
            // 2. Force the due date to be parsed as Local Time, not UTC
            const parts = item.date.split('-');
            const dueDate = new Date(parts[0], parts[1] - 1, parts[2]);

            // 3. Calculate difference in whole days
            const diffTime = dueDate - today;
            const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));
            
            let statusText = "";
            let isUrgent = diffDays <= 1;

            if (diffDays === 0) statusText = "Due Today";
            else if (diffDays === 1) statusText = "Due Tomorrow";
            else if (diffDays < 0) statusText = "Overdue";
            else statusText = `${diffDays} Days Left`;

            const card = document.createElement('div');
            card.className = `deadline-card ${isUrgent ? 'urgent' : ''}`;
            
            card.innerHTML = `
                <div class="info">
                    <h3>${item.title}</h3>
                    <p>${item.category}</p>
                </div>
                <div class="status">
                    <span class="days-left">${statusText}</span>
                    <span class="date-label">${dueDate.toLocaleDateString('en-GB')}</span>
                </div>
            `;
            
            container.appendChild(card);
        });
    }

    updateDashboard();
</script>

</body>
</html>
